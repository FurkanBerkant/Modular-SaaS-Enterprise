<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap — Randevio</title>
</head>
<body>

<div layout:fragment="content">
    <style>
        .login-wrap {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            position: relative;
        }
        .login-glow {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
            top: 0; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .login-card {
            width: 100%; max-width: 440px;
            background: rgba(22, 27, 39, 0.95);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            padding: 32px 36px 0;
            text-align: center;
        }
        .login-icon {
            width: 52px; height: 52px;
            background: rgba(0,229,160,0.1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: #00E5A0;
        }
        .login-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: white;
            letter-spacing: -0.02em;
        }
        .login-sub { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 6px; }
        .login-body { padding: 28px 36px 36px; }

        .google-btn {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 11px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: all 0.2s;
        }
        .google-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); color: white; }

        .divider-line {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
        }
        .divider-line::before, .divider-line::after {
            content: ''; flex: 1;
            height: 1px; background: rgba(255,255,255,0.07);
        }
        .divider-line span { font-size: 0.72rem; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.08em; }

        .field-label {
            display: block;
            font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.07em;
            color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
        }
        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .field-input:focus { border-color: rgba(0,229,160,0.5); background: rgba(0,229,160,0.03); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }
        .field-group { margin-bottom: 16px; }

        .btn-submit {
            width: 100%;
            background: #00E5A0;
            color: #0a0a0a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 13px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover { background: #00ffb3; box-shadow: 0 8px 25px rgba(0,229,160,0.3); }

        .remember-row {
            display: flex; align-items: center; justify-content: space-between;
            margin: 4px 0 16px;
        }
        .remember-label { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: rgba(255,255,255,0.45); cursor: pointer; }
        .forgot-link { font-size: 0.78rem; color: #00E5A0; font-weight: 600; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }

        .register-row {
            text-align: center;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.83rem; color: rgba(255,255,255,0.4);
        }
        .register-row a { color: #00E5A0; font-weight: 700; text-decoration: none; margin-left: 4px; }
        .register-row a:hover { text-decoration: underline; }

        .success-box {
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem; color: #00E5A0;
            display: flex; align-items: center; gap: 8px;
            margin-top: 12px;
        }
        .error-box {
            background: rgba(255,60,60,0.08);
            border: 1px solid rgba(255,60,60,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem; color: #ff6b6b;
            display: flex; align-items: center; gap: 8px;
            margin-top: 12px;
        }

        input[type="checkbox"] { accent-color: #00E5A0; width: 15px; height: 15px; }
    </style>

    <div class="login-wrap">
        <div class="login-glow"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="login-title">Tekrar Hoş Geldiniz</div>
                <div class="login-sub">Randevio panelinize giriş yapın</div>
            </div>

            <div class="login-body">
                <a th:href="@{/oauth2/authorization/google}" class="google-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width:18px;height:18px;flex-shrink:0">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Google ile Devam Et
                </a>

                <div class="divider-line"><span>VEYA E-POSTA İLE</span></div>

                <form th:action="@{/login}" method="POST">
                    <div class="field-group">
                        <label class="field-label">E-posta Adresi</label>
                        <input name="username" type="email" autocomplete="email" required
                               class="field-input" placeholder="ninja@randevio.app">
                    </div>

                    <div class="field-group">
                        <label class="field-label">Şifre</label>
                        <input name="password" type="password" autocomplete="current-password" required
                               class="field-input" placeholder="••••••••">
                    </div>

                    <div class="remember-row">
                        <label class="remember-label">
                            <input type="checkbox" name="remember-me">
                            Beni hatırla
                        </label>
                        <a href="#" class="forgot-link">Şifremi Unuttum</a>
                    </div>

                    <button type="submit" class="btn-submit">Giriş Yap</button>

                    <div th:if="${param.error}" class="error-box">
                        <svg xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        E-posta veya şifre hatalı.
                    </div>
                    <div th:if="${param.registered}" class="success-box">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                        Kayıt başarılı! Şimdi giriş yapabilirsiniz.
                    </div>
                </form>

                <div class="register-row">
                    Hesabınız yok mu?
                    <a href="/register">Kayıt Oluştur</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
