<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Paket Ekle — Randevio</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .pe-wrap { padding: 32px; min-height: calc(100vh - 60px); }
        .page-header { margin-bottom: 32px; }
        .page-title { font-weight: 800; font-size: 1.5rem; color: white; letter-spacing: -0.02em; }
        .page-sub { font-size: 0.83rem; color: rgba(255,255,255,0.38); margin-top: 4px; }

        .btn-add {
            display: inline-flex; align-items: center; gap: 8px;
            background: #00E5A0; color: #0a0a0a;
            font-weight: 700; font-size: 0.875rem;
            padding: 11px 22px; border-radius: 10px; border: none;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-add:hover { background: #00ffb3; box-shadow: 0 6px 20px rgba(0,229,160,0.3); }

        /* Paket kartları grid */
        .paket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
        .paket-card {
            background: rgba(22,27,39,0.95);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 24px;
            transition: all 0.25s;
        }
        .paket-card:hover { border-color: rgba(0,229,160,0.2); transform: translateY(-2px); }
        .paket-card-name { font-weight: 700; font-size: 1rem; color: white; margin-bottom: 8px; }
        .paket-card-meta { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

        /* Empty state */
        .empty-state {
            background: rgba(22,27,39,0.5);
            border: 2px dashed rgba(255,255,255,0.06);
            border-radius: 16px; padding: 64px 20px;
            text-align: center; color: rgba(255,255,255,0.2);
            margin-top: 24px;
        }
        .empty-state p { font-size: 0.88rem; margin-top: 12px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 50;
        }
        .modal-box {
            background: #161b27;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; padding: 36px;
            width: 100%; max-width: 420px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease both;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }

        .modal-title { font-weight: 800; font-size: 1.2rem; color: white; margin-bottom: 24px; }

        .field-label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(255,255,255,0.38); margin-bottom: 8px; }
        .field-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 14px; color: white; font-size: 0.875rem; outline: none; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
        .field-input:focus { border-color: rgba(0,229,160,0.5); background: rgba(0,229,160,0.03); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
        .field-input::placeholder { color: rgba(255,255,255,0.18); }
        .field-group { margin-bottom: 18px; }

        .preview-row { background: rgba(0,229,160,0.06); border: 1px solid rgba(0,229,160,0.12); border-radius: 9px; padding: 12px 16px; font-size: 0.83rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
        .preview-row span { color: #00E5A0; font-weight: 700; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { background: transparent; color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 10px 18px; cursor: pointer; font-size: 0.875rem; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: white; }
        .btn-save { background: #00E5A0; color: #0a0a0a; border: none; border-radius: 9px; padding: 10px 22px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 0.875rem; transition: all 0.2s; }
        .btn-save:hover { background: #00ffb3; box-shadow: 0 6px 20px rgba(0,229,160,0.3); }
    </style>

    <div class="pe-wrap" x-data="{
    modalAcik: false,
    paketAdi: '',
    paketler: [],
    kaydet() {
        if (this.paketAdi.trim()) {
            this.paketler.push({ ad: this.paketAdi.trim() });
            this.paketAdi = '';
            this.modalAcik = false;
        }
    }
}">
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <div class="page-title">Hizmet Paketleri</div>
                <div class="page-sub">İşletmenizin sunduğu paketleri buradan yönetin.</div>
            </div>
            <button @click="modalAcik = true" class="btn-add">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Yeni Paket Ekle
            </button>
        </div>

        <!-- Paket listesi -->
        <div class="paket-grid" x-show="paketler.length > 0">
            <template x-for="(paket, i) in paketler" :key="i">
                <div class="paket-card">
                    <div class="paket-card-name" x-text="paket.ad"></div>
                    <div class="paket-card-meta">Aktif paket</div>
                </div>
            </template>
        </div>

        <!-- Empty state -->
        <div class="empty-state" x-show="paketler.length === 0">
            <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto; opacity:0.3"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <p>Henüz paket eklenmemiş. İlk paketinizi ekleyin.</p>
        </div>

        <!-- Modal -->
        <div x-show="modalAcik" class="modal-overlay" style="display:none;"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100">
            <div @click.away="modalAcik = false" class="modal-box">
                <div class="modal-title">Yeni Paket Detayı</div>

                <div class="field-group">
                    <label class="field-label">Paket Adı</label>
                    <input type="text" x-model="paketAdi" class="field-input"
                           placeholder="Örn: 1 Aylık Diyet Programı"
                           @keydown.enter.prevent="kaydet()">
                </div>

                <div class="preview-row" x-show="paketAdi">
                    Oluşturulacak: <span x-text="paketAdi"></span>
                </div>

                <div class="modal-actions">
                    <button type="button" @click="modalAcik = false; paketAdi = ''" class="btn-cancel">İptal</button>
                    <button type="button" @click="kaydet()" class="btn-save" :disabled="!paketAdi.trim()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
