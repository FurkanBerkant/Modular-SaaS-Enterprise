<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:x-transition="http://www.w3.org/1999/xhtml"
      data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Platform</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-base-200 min-h-screen">

<div x-data="{ modalAcik: false, paketAdi: '' }" class="p-8">

    <button @click="modalAcik = true" class="btn btn-primary">
        + Yeni Hizmet Paketi Ekle
    </button>

    <div
            x-show="modalAcik"
            x-cloak
            x-transition.opacity
            class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50">

        <div
                @click.away="modalAcik = false"
                x-show="modalAcik"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 scale-95"
                x-transition:enter-end="opacity-100 scale-100"
                class="bg-base-100 p-6 rounded-xl shadow-xl w-96 border border-base-300">

            <h2 class="text-xl font-bold mb-4">Yeni Paket Detayı</h2>

            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text">Paket Adı:</span>
                </label>
                <input
                        type="text"
                        x-model="paketAdi"
                        class="input input-bordered w-full mb-4"
                        placeholder="Örn: 1 Aylık Diyet">
            </div>

            <p class="text-sm text-gray-500 mb-4">
                Oluşturulacak paket:
                <span x-text="paketAdi" class="font-bold text-primary"></span>
            </p>

            <div class="flex justify-end gap-2">
                <button @click="modalAcik = false" class="btn btn-ghost">İptal</button>
                <button @click="modalAcik = false" class="btn btn-success text-white">Kaydet</button>
            </div>

        </div>
    </div>
</div>
</body>
</html>
