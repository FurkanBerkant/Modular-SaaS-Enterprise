<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Müşteri Profili — Randevio</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .crm-wrap { padding: 32px; min-height: calc(100vh - 60px); }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.35);
            text-decoration: none; margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #00E5A0; }

        .page-title { font-weight: 800; font-size: 1.5rem; color: white; letter-spacing: -0.02em; }
        .page-sub { font-size: 0.83rem; color: rgba(255,255,255,0.35); margin-top: 4px; }

        .crm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 32px; }

        /* Card base */
        .crm-card { background: rgba(22,27,39,0.95); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 28px; }
        .card-title {
            font-weight: 800; font-size: 1rem; color: white; margin-bottom: 24px;
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Timeline */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .timeline-item { display: flex; gap: 16px; padding-bottom: 20px; position: relative; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-item:not(:last-child)::before {
            content: ''; position: absolute;
            left: 15px; top: 32px; bottom: 0;
            width: 2px; background: rgba(255,255,255,0.05);
        }
        .timeline-dot {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; z-index: 1;
        }
        .dot-approved { background: rgba(0,229,160,0.12); border: 2px solid rgba(0,229,160,0.3); color: #00E5A0; }
        .dot-pending  { background: rgba(255,200,0,0.1);  border: 2px solid rgba(255,200,0,0.25); color: #ffc800; }
        .dot-rejected { background: rgba(255,80,80,0.1);  border: 2px solid rgba(255,80,80,0.2);  color: #ff6b6b; }
        .dot-default  { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

        .timeline-body { flex: 1; padding-top: 4px; }
        .tl-date { font-weight: 700; font-size: 0.9rem; color: white; }
        .tl-service { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-top: 3px; }
        .status-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 3px 8px; border-radius: 5px; margin-top: 6px; }
        .badge-approved { background: rgba(0,229,160,0.1); color: #00E5A0; }
        .badge-pending  { background: rgba(255,200,0,0.1); color: #ffc800; }
        .badge-rejected { background: rgba(255,80,80,0.1); color: #ff6b6b; }

        .empty-timeline { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.2); font-size: 0.85rem; }

        /* Notes */
        .notes-list { display: flex; flex-direction: column; gap: 12px; max-height: 320px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px; }
        .notes-list::-webkit-scrollbar { width: 4px; }
        .notes-list::-webkit-scrollbar-track { background: transparent; }
        .notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .note-item {
            background: rgba(255,229,0,0.04); border: 1px solid rgba(255,229,0,0.1);
            border-left: 3px solid rgba(255,200,0,0.4);
            border-radius: 0 10px 10px 0; padding: 14px 16px;
        }
        .note-content { font-size: 0.87rem; color: rgba(255,255,255,0.7); line-height: 1.6; white-space: pre-line; }
        .note-date { font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-top: 8px; text-align: right; }

        .empty-notes { text-align: center; padding: 28px 0; color: rgba(255,255,255,0.2); font-size: 0.83rem; }

        /* Note form */
        .note-textarea {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px 14px; color: white; font-size: 0.875rem;
            outline: none; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;
            resize: none; height: 90px;
        }
        .note-textarea:focus { border-color: rgba(255,200,0,0.4); background: rgba(255,200,0,0.02); box-shadow: 0 0 0 3px rgba(255,200,0,0.06); }
        .note-textarea::placeholder { color: rgba(255,255,255,0.18); }

        .btn-save-note {
            width: 100%; margin-top: 10px;
            background: rgba(255,200,0,0.12); border: 1px solid rgba(255,200,0,0.25);
            color: #ffc800; font-weight: 700; font-size: 0.875rem;
            padding: 12px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-save-note:hover:not(:disabled) { background: rgba(255,200,0,0.2); border-color: rgba(255,200,0,0.4); }
        .btn-save-note:disabled { opacity: 0.4; cursor: not-allowed; }

        .success-toast {
            background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2);
            border-radius: 9px; padding: 10px 14px;
            font-size: 0.8rem; color: #00E5A0; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,200,0,0.2); border-top-color: #ffc800; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tags */
        .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
        .tag { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.5); }

        @media (max-width: 768px) {
            .crm-grid { grid-template-columns: 1fr; }
        }
    </style>

    <div class="crm-wrap">
        <a href="/provider/radar" class="back-link">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Geri
        </a>

        <div>
            <div class="page-title">Müşteri Profili</div>
            <div class="page-sub" th:text="'Müşteri ID: ' + ${customerId}">Müşteri bilgileri</div>

            <!-- Tags -->
            <div class="tags-row" th:if="${not #lists.isEmpty(profile.record().tags())}">
                <span th:each="tag : ${profile.record().tags()}" class="tag" th:text="${tag}"></span>
            </div>
        </div>

        <div class="crm-grid">

            <!-- Randevu Geçmişi -->
            <div class="crm-card">
                <div class="card-title">
                    <div class="card-icon" style="background:rgba(0,229,160,0.1); color:#00E5A0;">
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    Randevu Geçmişi
                    <span style="margin-left:auto; font-size:0.75rem; font-weight:600; color:rgba(255,255,255,0.3);"
                          th:text="${#lists.size(profile.history())} + ' randevu'"></span>
                </div>

                <div class="timeline" th:if="${not #lists.isEmpty(profile.history())}">
                    <div class="timeline-item" th:each="appt : ${profile.history()}">
                        <div class="timeline-dot"
                             th:classappend="${appt.status.name() == 'APPROVED'} ? 'dot-approved' : (${appt.status.name() == 'PENDING'} ? 'dot-pending' : (${appt.status.name() == 'REJECTED'} ? 'dot-rejected' : 'dot-default'))">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                        </div>
                        <div class="timeline-body">
                            <div class="tl-date" th:text="${appt.date} + ' · ' + ${appt.time}">Tarih</div>
                            <div class="tl-service" th:text="'Hizmet: ' + ${appt.serviceId}">Hizmet</div>
                            <span class="status-badge"
                                  th:classappend="${appt.status.name() == 'APPROVED'} ? 'badge-approved' : (${appt.status.name() == 'PENDING'} ? 'badge-pending' : 'badge-rejected')"
                                  th:text="${appt.status}">Durum</span>
                        </div>
                    </div>
                </div>

                <div class="empty-timeline" th:if="${#lists.isEmpty(profile.history())}">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 10px; opacity:0.3"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <p>Henüz randevu geçmişi yok.</p>
                </div>
            </div>

            <!-- Gizli Notlar -->
            <div class="crm-card"
                 x-data="{
                yeniNot: '',
                loading: false,
                basari: false,
                notlar: [],

                init() {
                    // Mevcut notları Alpine state'e yükle (Thymeleaf ile inline JSON)
                    this.notlar = /*[[${profile.record().privateNotes()}]]*/ [];
                },

                async notEkle() {
                    if (!this.yeniNot.trim()) return;
                    this.loading = true;
                    const customerId = /*[[${customerId}]]*/ '';
                    try {
                        const res = await fetch(`/api/crm/${customerId}/notes`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: this.yeniNot })
                        });
                        if (res.ok) {
                            // Sayfayı yenilemek yerine state'i güncelle
                            this.notlar.unshift({ content: this.yeniNot, createdAt: new Date().toISOString() });
                            this.yeniNot = '';
                            this.basari = true;
                            setTimeout(() => this.basari = false, 3000);
                        }
                    } finally {
                        this.loading = false;
                    }
                }
             }">

                <div class="card-title">
                    <div class="card-icon" style="background:rgba(255,200,0,0.1); color:#ffc800;">
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </div>
                    Gizli Notlar
                    <span style="margin-left:auto; font-size:0.72rem; font-weight:600; background:rgba(255,200,0,0.08); color:rgba(255,200,0,0.6); padding:3px 8px; border-radius:5px; letter-spacing:0.05em;">SADECE SİZ GÖRÜRSÜNÜZ</span>
                </div>

                <!-- Başarı toast -->
                <div x-show="basari" x-transition class="success-toast">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                    Not kaydedildi.
                </div>

                <!-- Not listesi (Alpine state ile render) -->
                <div class="notes-list">
                    <template x-if="notlar.length === 0">
                        <div class="empty-notes">
                            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 8px; opacity:0.3"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            <p>Henüz not eklenmemiş.</p>
                        </div>
                    </template>
                    <template x-for="(note, i) in notlar" :key="i">
                        <div class="note-item">
                            <div class="note-content" x-text="note.content"></div>
                            <div class="note-date" x-text="new Date(note.createdAt).toLocaleString('tr-TR')"></div>
                        </div>
                    </template>
                </div>

                <!-- Not ekleme formu -->
                <textarea class="note-textarea" x-model="yeniNot"
                          placeholder="Bu müşteri hakkında hatırlamak istediğiniz bir şey..."
                          @keydown.ctrl.enter.prevent="notEkle()"></textarea>
                <div style="font-size:0.68rem; color:rgba(255,255,255,0.18); margin-top:5px; text-align:right;">Ctrl+Enter ile hızlı kaydet</div>

                <button class="btn-save-note" @click="notEkle()" :disabled="loading || !yeniNot.trim()">
                    <div class="spinner" x-show="loading"></div>
                    <svg x-show="!loading" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
                    <span x-show="!loading">Notu Kaydet</span>
                    <span x-show="loading">Kaydediliyor...</span>
                </button>
            </div>

        </div>
    </div>
</div>
</body>
</html>
