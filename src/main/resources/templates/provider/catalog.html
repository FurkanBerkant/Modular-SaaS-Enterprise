<div layout:fragment="content" xmlns:layout="http://www.w3.org/1999/xhtml">
<div x-data="{ modalAcik: false }" class="p-6 bg-base-200 min-h-screen">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Hizmet Katalo&#287;u</h2>
        <button @click="modalAcik = true" class="btn btn-primary">+ Yeni Hizmet Ekle</button>
    </div>
    <div class="overflow-x-auto bg-base-100 rounded-box shadow">
        <table class="table w-full">
            <thead>
                <tr>
                    <th>Hizmet Ad&#305;</th>
                    <th>S&#252;re (Dk)</th>
                    <th>Fiyat (TL)</th>
                    <th>&#304;&#351;lem</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="service : ${provider.services}">
                    <td th:text="${service.name}">Sa&#231; Kesimi</td>
                    <td th:text="${service.durationMinutes}">30</td>
                    <td th:text="${service.price + ' &#8378;'}">300 &#8378;</td>
                    <td>
                        <button class="btn btn-error btn-sm">Sil</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div x-show="modalAcik" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50" style="display: none;">
        <div @click.away="modalAcik = false" class="bg-base-100 p-8 rounded-lg shadow-xl w-96">
            <h3 class="text-xl font-bold mb-4">Yeni Hizmet Detaylar&#305;</h3>
            <form action="/provider/catalog/add" method="POST">
                <div class="form-control mb-4">
                    <label class="label">Hizmet Ad&#305;</label>
                    <input type="text" name="name" class="input input-bordered" placeholder="&#214;rn: Cilt Bak&#305;m&#305;" required>
                </div>
                <div class="form-control mb-4">
                    <label class="label">S&#252;re (Dakika)</label>
                    <input type="number" name="duration" class="input input-bordered" placeholder="45" required>
                </div>
                <div class="form-control mb-6">
                    <label class="label">Fiyat (TL)</label>
                    <input type="number" step="0.01" name="price" class="input input-bordered" placeholder="500.00" required>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" @click="modalAcik = false" class="btn btn-ghost">&#304;ptal</button>
                    <button type="submit" class="btn btn-success">Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
