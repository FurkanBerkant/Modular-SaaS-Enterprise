<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hizmet Kataloğu</title>
</head>
<body>
<style>
    .catalog-page { padding: 32px; background: var(--ninja-surface, #0f1117); min-height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
    .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; color: white; letter-spacing: -0.02em; }
    .page-sub { font-size: 0.85rem; color: rgba(255,255,255,0.35); margin-top: 4px; }

    .btn-add {
        display: flex; align-items: center; gap: 8px;
        background: #00E5A0; color: #0a0a0a;
        font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.875rem;
        padding: 10px 20px; border-radius: 10px; border: none;
        cursor: pointer; transition: all 0.2s;
    }
    .btn-add:hover { background: #00ffb3; box-shadow: 0 6px 20px rgba(0,229,160,0.3); }

    .table-card {
        background: rgba(22, 27, 39, 0.95);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px; overflow: hidden;
    }
    .ninja-table { width: 100%; border-collapse: collapse; }
    .ninja-table thead tr {
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ninja-table th {
        padding: 14px 20px;
        text-align: left;
        font-size: 0.7rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.1em;
        color: rgba(255,255,255,0.3);
    }
    .ninja-table th:last-child, .ninja-table td:last-child { text-align: center; }
    .ninja-table th:nth-child(3), .ninja-table td:nth-child(3) { text-align: right; }
    .ninja-table tbody tr {
        border-bottom: 1px solid rgba(255,255,255,0.04);
        transition: background 0.15s;
    }
    .ninja-table tbody tr:last-child { border-bottom: none; }
    .ninja-table tbody tr:hover { background: rgba(255,255,255,0.02); }
    .ninja-table td { padding: 16px 20px; font-size: 0.9rem; color: rgba(255,255,255,0.8); }

    .service-name { font-weight: 600; color: white; }
    .duration-badge {
        display: inline-flex; align-items: center; gap: 4px;
        background: rgba(255,255,255,0.06); border-radius: 6px;
        padding: 3px 10px; font-size: 0.78rem; color: rgba(255,255,255,0.5);
    }
    .price-val { font-weight: 700; color: #00E5A0; font-family: 'Syne', sans-serif; }

    .btn-delete {
        background: transparent; border: 1px solid rgba(255,60,60,0.2);
        color: rgba(255,100,100,0.7); font-size: 0.78rem; font-weight: 600;
        padding: 5px 12px; border-radius: 7px;
        cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(255,60,60,0.08); border-color: rgba(255,60,60,0.4); color: #ff6b6b; }

    /* Modal */
    .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-box {
        background: #161b27;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 36px; width: 100%; max-width: 440px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        animation: modalIn 0.25s ease both;
    }
    @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: white; margin-bottom: 24px; }

    .field-label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .field-input {
        width: 100%; background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
        padding: 11px 14px; color: white; font-size: 0.875rem;
        transition: all 0.2s; outline: none; font-family: 'DM Sans', sans-serif;
    }
    .field-input:focus { border-color: rgba(0,229,160,0.5); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); background: rgba(0,229,160,0.02); }
    .field-input::placeholder { color: rgba(255,255,255,0.2); }
    .field-group { margin-bottom: 16px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 10px 18px; border-radius: 9px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .btn-cancel:hover { background: rgba(255,255,255,0.05); color: white; }
    .btn-save { background: #00E5A0; color: #0a0a0a; border: none; padding: 10px 22px; border-radius: 9px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.875rem; transition: all 0.2s; }
    .btn-save:hover { background: #00ffb3; box-shadow: 0 6px 20px rgba(0,229,160,0.3); }

    .empty-state { text-align: center; padding: 64px 20px; color: rgba(255,255,255,0.2); }
    .empty-state svg { margin: 0 auto 16px; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }
</style>

<div class="catalog-page" x-data="{ modalAcik: false }">
    <div class="page-header">
        <div>
            <div class="page-title">Hizmet Kataloğu</div>
            <div class="page-sub">Sunduğunuz hizmetleri buradan yönetin.</div>
        </div>
        <button @click="modalAcik = true" class="btn-add">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Yeni Hizmet Ekle
        </button>
    </div>

    <div class="table-card">
        <table class="ninja-table">
            <thead>
            <tr>
                <th>Hizmet Adı</th>
                <th>Süre</th>
                <th>Fiyat</th>
                <th>İşlem</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="service : ${provider.services}">
                <td><span class="service-name" th:text="${service.name}">Hizmet</span></td>
                <td>
                        <span class="duration-badge">
                            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                            <span th:text="${service.durationMinutes + ' dk'}">0 dk</span>
                        </span>
                </td>
                <td><span class="price-val" th:text="${#numbers.formatDecimal(service.price, 1, 'POINT', 2, 'COMMA') + ' ₺'}">0,00 ₺</span></td>
                <td>
                    <form th:action="@{/provider/catalog/delete/{id}(id=${service.id})}" method="POST">
                        <button type="submit" class="btn-delete">Sil</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(provider.services)}">
                <td colspan="4">
                    <div class="empty-state">
                        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>Henüz hizmet eklenmemiş. İlk hizmetinizi ekleyin.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div x-show="modalAcik" class="modal-overlay" style="display:none;" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
        <div @click.away="modalAcik = false" class="modal-box">
            <div class="modal-title">Yeni Hizmet Bilgileri</div>

            <form th:action="@{/provider/catalog/add}" method="POST" accept-charset="UTF-8">
                <div class="field-group">
                    <label class="field-label">Hizmet Adı</label>
                    <input type="text" name="name" class="field-input" placeholder="Örn: Ağda, Kaş Tasarımı..." required>
                </div>

                <div class="modal-grid">
                    <div>
                        <label class="field-label">Süre (Dakika)</label>
                        <input type="number" name="durationMinutes" class="field-input" placeholder="30" required>
                    </div>
                    <div>
                        <label class="field-label">Fiyat (₺)</label>
                        <input type="number" step="0.01" name="price" class="field-input" placeholder="250" required>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" @click="modalAcik = false" class="btn-cancel">Vazgeç</button>
                    <button type="submit" class="btn-save">Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
