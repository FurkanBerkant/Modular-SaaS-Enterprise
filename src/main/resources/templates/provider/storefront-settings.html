<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vitrin Ayarları</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script>
        // Mapper: data-* attributes -> Alpine attributes. Reused from onboarding to satisfy IDE validators.
        document.addEventListener('DOMContentLoaded', function () {
            const map = {
                'data-x-data': 'x-data',
                'data-x-show': 'x-show',
                'data-x-transition': 'x-transition',
                'data-x-model': 'x-model',
                'data-x-text': 'x-text',
                'data-bind-style': ':style',
                'data-on-change': '@change',
                'data-on-input': '@input'
            };
            Object.keys(map).forEach(function (src) {
                document.querySelectorAll('[' + src + ']').forEach(function (el) {
                    const val = el.getAttribute(src);
                    el.setAttribute(map[src], val);
                    el.removeAttribute(src);
                });
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>
</head>

<body class="bg-gray-100 p-6">
    <div data-x-data="{ renk: '#3b82f6', bio: 'Müşterilerinize kendinizi tanıtın...' }" class="flex gap-8 p-6">

        <div class="w-1/3 bg-base-100 p-6 rounded-box shadow">
            <h2 class="text-xl font-bold mb-4">Vitrin Ayarları</h2>

            <form action="/provider/storefront" method="POST" enctype="multipart/form-data">
                <label class="label" for="themeColor">Tema Rengi</label>
                <input id="themeColor" type="color" name="themeColor" data-x-model="renk" class="w-full h-12 rounded cursor-pointer mb-4" />

                <label class="label" for="bio">Hakkımda</label>
                <textarea id="bio" name="bio" data-x-model="bio" class="textarea textarea-bordered w-full h-24 mb-4"></textarea>

                <label class="label" for="profileImage">Profil Fotoğrafı</label>
                <input id="profileImage" type="file" name="profileImage" accept="image/*" class="file-input file-input-bordered w-full mb-4" />

                <button type="submit" class="btn btn-primary w-full">Değişiklikleri Kaydet</button>
            </form>
        </div>

        <div class="w-2/3 border-4 border-dashed rounded-box p-4 bg-gray-50 relative">
            <span class="absolute top-2 right-2 badge badge-ghost">Canlı Önizleme</span>

            <div class="rounded-t-box h-32 flex items-end p-4" data-bind-style="`background-color: ${renk}`">
                <h1 class="text-3xl font-bold text-white shadow-sm" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.5);">Dükkan Adı</h1>
            </div>

            <div class="bg-white p-6 rounded-b-box shadow-sm mt-1">
                <h3 class="font-semibold text-lg mb-2">Hakkımda</h3>
                <p class="text-gray-600" data-x-text="bio"></p>
            </div>
        </div>

    </div>
</body>

</html>
