<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Vitrin Ayarları — Randevio</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .sf-wrap { padding: 32px; min-height: calc(100vh - 60px); }
        .sf-grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; margin-top: 32px; }

        /* Settings panel */
        .settings-card { background: rgba(22,27,39,0.95); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 32px; height: fit-content; }
        .settings-title { font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 28px; }

        .field-label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(255,255,255,0.38); margin-bottom: 8px; }
        .field-group { margin-bottom: 20px; }
        .field-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 14px; color: white; font-size: 0.875rem; outline: none; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
        .field-input:focus { border-color: rgba(0,229,160,0.5); background: rgba(0,229,160,0.03); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
        .field-input::placeholder { color: rgba(255,255,255,0.18); }

        .color-row { display: flex; align-items: center; gap: 12px; }
        .color-swatch { width: 44px; height: 44px; border-radius: 10px; border: none; cursor: pointer; flex-shrink: 0; }
        .color-hex { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: white; font-size: 0.83rem; font-family: monospace; width: 100%; outline: none; }
        .color-hex:focus { border-color: rgba(0,229,160,0.5); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }

        .file-upload-area {
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 10px; padding: 20px;
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .file-upload-area:hover { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.03); }
        .file-upload-area input[type="file"] { display: none; }
        .file-upload-label { font-size: 0.82rem; color: rgba(255,255,255,0.4); cursor: pointer; }
        .file-upload-label span { color: #00E5A0; font-weight: 600; }

        .btn-save { width: 100%; background: #00E5A0; color: #0a0a0a; font-weight: 700; font-size: 0.9rem; padding: 13px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; margin-top: 8px; }
        .btn-save:hover { background: #00ffb3; box-shadow: 0 6px 20px rgba(0,229,160,0.3); }

        /* Preview panel */
        .preview-card { background: rgba(22,27,39,0.95); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; overflow: hidden; }
        .preview-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; margin: 16px 16px 0; display: block; width: fit-content; }
        .preview-header { height: 140px; display: flex; align-items: flex-end; padding: 24px; transition: background-color 0.3s; }
        .preview-biz-name { font-weight: 800; font-size: 1.6rem; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.5); letter-spacing: -0.02em; }
        .preview-body { padding: 28px; }
        .preview-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
        .preview-bio { font-size: 0.9rem; color: rgba(255,255,255,0.55); line-height: 1.65; min-height: 48px; }

        @media (max-width: 900px) {
            .sf-grid { grid-template-columns: 1fr; }
        }
    </style>

    <div class="sf-wrap" x-data="{
    renk: '#00E5A0',
    bio: 'Müşterilerinize kendinizi tanıtın...',
    updateColor(e) { this.renk = e.target.value; }
}">
        <div>
            <div style="font-weight:800; font-size:1.4rem; color:white; letter-spacing:-0.02em;">Vitrin Ayarları</div>
            <div style="font-size:0.83rem; color:rgba(255,255,255,0.4); margin-top:4px;">Müşterilerinizin göreceği sayfayı özelleştirin.</div>
        </div>

        <div class="sf-grid">
            <!-- Settings -->
            <div class="settings-card">
                <div class="settings-title">Ayarlar</div>

                <form action="/provider/storefront" method="POST" enctype="multipart/form-data">
                    <div class="field-group">
                        <label class="field-label">Tema Rengi</label>
                        <div class="color-row">
                            <input type="color" name="themeColor" x-model="renk" class="color-swatch"
                                   style="background: none; padding: 0;" @input="renk = $event.target.value">
                            <input type="text" x-model="renk" class="color-hex" placeholder="#00E5A0" maxlength="7">
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">Hakkımda</label>
                        <textarea name="bio" x-model="bio" class="field-input" style="height:100px; resize:vertical;"
                                  placeholder="Kendinizi müşterilerinize tanıtın..."></textarea>
                    </div>

                    <div class="field-group">
                        <label class="field-label">Profil Fotoğrafı</label>
                        <label class="file-upload-area">
                            <input type="file" name="profileImage" accept="image/*">
                            <div class="file-upload-label">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin: 0 auto 8px; display:block; opacity:0.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                <span>Fotoğraf seç</span> veya sürükle bırak
                            </div>
                        </label>
                    </div>

                    <button type="submit" class="btn-save">Değişiklikleri Kaydet</button>
                </form>
            </div>

            <!-- Preview -->
            <div class="preview-card">
            <span class="preview-badge">
                <svg width="6" height="6" viewBox="0 0 6 6" fill="#00E5A0"><circle cx="3" cy="3" r="3"/></svg>
                Canlı Önizleme
            </span>

                <div class="preview-header" :style="`background: linear-gradient(160deg, ${renk}33 0%, ${renk}11 100%); border-bottom: 1px solid ${renk}22`">
                    <div class="preview-biz-name">İşletme Adınız</div>
                </div>

                <div class="preview-body">
                    <div class="preview-section-label">Hakkımda</div>
                    <div class="preview-bio" x-text="bio || 'Buraya yazınız...'"></div>

                    <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05);">
                        <div class="preview-section-label">Tema Rengi</div>
                        <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
                            <div style="width:36px; height:36px; border-radius:8px; transition: background 0.3s;" :style="`background: ${renk}`"></div>
                            <span style="font-size:0.83rem; color:rgba(255,255,255,0.4); font-family:monospace;" x-text="renk"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
