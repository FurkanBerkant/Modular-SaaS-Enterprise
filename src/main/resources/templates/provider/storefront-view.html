<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Vitrin — Randevio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<div layout:fragment="content">
    <style>
        .sv-wrap { padding: 40px 32px; min-height: calc(100vh - 60px); }
        .sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 32px; }

        .biz-name { font-weight: 800; font-size: 2rem; color: white; letter-spacing: -0.025em; line-height: 1.15; }
        .biz-bio { font-size: 0.95rem; color: rgba(255,255,255,0.45); line-height: 1.7; margin-top: 12px; font-style: italic; }

        .address-box { display: flex; align-items: flex-start; gap: 12px; background: rgba(22,27,39,0.95); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px 20px; margin-top: 20px; }
        .address-icon { color: #00E5A0; flex-shrink: 0; margin-top: 2px; }
        .address-text { font-size: 0.9rem; color: rgba(255,255,255,0.65); line-height: 1.55; }

        .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .info-card { background: rgba(22,27,39,0.95); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px 18px; }
        .info-card-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(255,255,255,0.28); margin-bottom: 6px; }
        .info-card-val { font-size: 0.9rem; font-weight: 700; color: white; }

        .btn-book { display: inline-flex; align-items: center; gap: 8px; background: #00E5A0; color: #0a0a0a; font-weight: 700; font-size: 0.9rem; padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; margin-top: 24px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .btn-book:hover { background: #00ffb3; box-shadow: 0 8px 25px rgba(0,229,160,0.3); }

        /* Map */
        .map-container { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); height: 100%; min-height: 420px; position: relative; }
        #map { width: 100%; height: 100%; min-height: 420px; }

        @media (max-width: 768px) {
            .sv-grid { grid-template-columns: 1fr; }
            .map-container { min-height: 280px; }
            #map { min-height: 280px; }
        }
    </style>

    <div class="sv-wrap">
        <div style="font-size:0.72rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:8px;">İşletme Vitrini</div>

        <div class="sv-grid">
            <!-- Info side -->
            <div>
                <div class="biz-name" th:text="${provider.businessName}">İşletme Adı</div>
                <div class="biz-bio" th:text="${provider.storefront?.bio}">İşletme hakkında bilgi...</div>

                <div class="address-box">
                    <div class="address-icon">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <div class="address-text" th:text="${provider.address?.fullAddress}">Adres bilgisi burada görünecek</div>
                </div>

                <div class="info-cards">
                    <div class="info-card">
                        <div class="info-card-label">Kategori</div>
                        <div class="info-card-val" th:text="${provider.category}">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Hizmet Sayısı</div>
                        <div class="info-card-val" th:text="${#lists.size(provider.services)} + ' hizmet'">—</div>
                    </div>
                </div>

                <a href="/booking" class="btn-book">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Randevu Al
                </a>
            </div>

            <!-- Map side -->
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const address = /*[[${provider.address?.fullAddress}]]*/ 'İstanbul';
            const businessName = /*[[${provider.businessName}]]*/ 'İşletme';

            const map = L.map('map', { zoomControl: true }).setView([39.9334, 32.8597], 6);

            // Dark-friendly harita katmanı
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap © CartoDB',
                maxZoom: 19
            }).addTo(map);

            const customIcon = L.divIcon({
                html: `<div style="
                width:36px; height:36px; background:#00E5A0; border-radius:50% 50% 50% 0;
                transform: rotate(-45deg); border: 3px solid #0f1117;
                box-shadow: 0 4px 12px rgba(0,229,160,0.4);
            "></div>`,
                className: '',
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -40]
            });

            async function locateAddress() {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        map.setView(coords, 16, { animate: true });
                        L.marker(coords, { icon: customIcon }).addTo(map)
                            .bindPopup(`<div style="font-family:'Plus Jakarta Sans',sans-serif; padding:4px"><strong>${businessName}</strong><br><small style="color:#666">${address}</small></div>`)
                            .openPopup();
                    }
                } catch (e) {
                    console.error('Harita hatası:', e);
                }
            }
            locateAddress();
        });
    </script>
</div>
</body>
</html>
