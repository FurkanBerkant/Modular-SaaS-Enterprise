<div class="container mx-auto mt-10 p-6 flex flex-col md:flex-row gap-6">
    <div class="w-full md:w-1/2 space-y-4">
        <h1 class="text-4xl font-extrabold text-base-content" th:text="${provider.businessName}">Dükkan Adı</h1>
        <p class="text-lg text-gray-500 italic" th:text="${provider.storefront.bio}">Hakkımda yazısı...</p>

        <div class="flex items-start gap-3 p-4 bg-base-200 rounded-lg shadow-sm">
            <svg class="w-6 h-6 text-primary mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span class="text-md font-medium" th:text="${provider.address.fullAddress}">Açık Adres Buraya Gelecek</span>
        </div>
    </div>

    <div class="w-full md:w-1/2">
        <div id="map" class="w-full h-96 rounded-2xl shadow-2xl border-2 border-primary/20 z-0"></div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // Verileri güvenli şekilde al
        const address = /*[[${provider.address.fullAddress}]]*/ 'İstanbul';
        const businessName = /*[[${provider.businessName}]]*/ 'İşletme';

        // 1. Haritayı Başlat (Default: Türkiye)
        const map = L.map('map').setView([39.9334, 32.8597], 6);

        // 2. Modern Harita Katmanı (CartoDB Positron - Daha temiz görünür)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB'
        }).addTo(map);

        // 3. Ücretsiz Geocoding İşlemi (Nominatim)
        async function locateAddress() {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const { lat, lon } = data[0];
                    const coords = [parseFloat(lat), parseFloat(lon)];

                    map.setView(coords, 16, { animate: true });

                    // Özel Marker (İşaretçi)
                    L.marker(coords).addTo(map)
                        .bindPopup(`<div class="p-2"><b>${businessName}</b><br><small>${address}</small></div>`)
                        .openPopup();
                } else {
                    console.warn("Adres hassas olarak bulunamadı, şehir merkezine odaklanılıyor.");
                }
            } catch (error) {
                console.error("Harita yükleme hatası:", error);
            }
        }

        locateAddress();
    });
</script>
