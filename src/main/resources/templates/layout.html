<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org" data-theme="corporate" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkninja SaaS Platformu</title>

    <link rel="stylesheet" th:href="@{/css/output.css}">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-base-200 min-h-screen text-base-content">

<header class="navbar bg-base-100 shadow-sm px-4 md:px-8">
    <div class="flex-1">
        <a th:href="@{/}" class="btn btn-ghost text-xl font-bold text-primary">
            Turkninja Pro
        </a>
    </div>

    <div class="flex-none">
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" class="btn btn-square btn-ghost">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     class="inline-block w-6 h-6 stroke-current">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <ul x-show="open"
                @click.away="open = false"
                x-transition
                class="absolute right-0 mt-3 w-52 bg-base-100 shadow-xl rounded-box z-50 p-2 border border-base-200">
                <li>
                    <a href="/login" class="btn btn-ghost w-full justify-start btn-sm">Giriş Yap</a>
                </li>
                <li>
                    <a href="/register" class="btn btn-primary w-full mt-2 btn-sm text-white">İşletme Kaydı</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="container mx-auto p-4 md:p-8">
    <div layout:fragment="content">
        <div class="text-center py-10">
            <h1 class="text-2xl font-bold">Hoş Geldiniz!</h1>
            <p class="opacity-60">İçerik eklemek için bu fragment'ı kullanın.</p>
        </div>
    </div>
</main>

</body>
</html>
