<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Günlük Planım — Randevio</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .emp-wrap { padding: 32px; min-height: calc(100vh - 60px); max-width: 800px; margin: 0 auto; }

        /* Üst bilgi */
        .greeting-card {
            background: linear-gradient(135deg, rgba(0,229,160,0.08) 0%, rgba(0,100,80,0.04) 100%);
            border: 1px solid rgba(0,229,160,0.15);
            border-radius: 16px; padding: 28px 32px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px;
        }
        .greeting-name { font-weight: 800; font-size: 1.4rem; color: white; letter-spacing: -0.02em; }
        .greeting-sub { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .greeting-biz {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem; font-weight: 600; color: #00E5A0;
            background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2);
            padding: 6px 14px; border-radius: 8px;
        }

        /* Tarih başlığı */
        .date-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .date-label { font-weight: 800; font-size: 1.1rem; color: white; letter-spacing: -0.01em; }
        .appt-count {
            font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px;
        }

        /* Randevu kartları */
        .appt-list { display: flex; flex-direction: column; gap: 12px; }

        .appt-card {
            background: rgba(22,27,39,0.95);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 20px 24px;
            display: flex; align-items: center; gap: 20px;
            transition: border-color 0.2s;
        }
        .appt-card:hover { border-color: rgba(0,229,160,0.15); }

        /* Saat bloğu */
        .appt-time-block {
            text-align: center; flex-shrink: 0;
            width: 64px;
        }
        .appt-time {
            font-family: 'Plus Jakarta Sans', monospace;
            font-weight: 800; font-size: 1.2rem; color: #00E5A0;
            letter-spacing: -0.02em;
        }
        .appt-time-label { font-size: 0.65rem; color: rgba(255,255,255,0.25); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

        /* Ayırıcı çizgi */
        .appt-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.06); flex-shrink: 0; }

        /* Randevu bilgisi */
        .appt-info { flex: 1; }
        .appt-customer { font-weight: 700; font-size: 0.95rem; color: white; }
        .appt-service { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* Durum */
        .appt-status {
            flex-shrink: 0;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
            padding: 5px 10px; border-radius: 6px;
        }
        .status-approved { background: rgba(0,229,160,0.1); color: #00E5A0; border: 1px solid rgba(0,229,160,0.2); }
        .status-pending  { background: rgba(255,200,0,0.1);  color: #ffc800; border: 1px solid rgba(255,200,0,0.2); }

        /* Boş durum */
        .empty-state {
            background: rgba(22,27,39,0.5);
            border: 2px dashed rgba(255,255,255,0.06);
            border-radius: 16px; padding: 64px 20px;
            text-align: center;
        }
        .empty-icon { margin: 0 auto 16px; opacity: 0.2; }
        .empty-title { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.4); }
        .empty-sub { font-size: 0.82rem; color: rgba(255,255,255,0.2); margin-top: 6px; }

        /* Alt not */
        .privacy-note {
            margin-top: 40px; padding: 14px 18px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 0.75rem; color: rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }
    </style>

    <div class="emp-wrap">

        <!-- Hoş geldin kartı -->
        <div class="greeting-card">
            <div>
                <div class="greeting-name">Merhaba 👋</div>
                <div class="greeting-sub"
                     th:text="${#temporals.format(#temporals.createNow(), 'dd MMMM yyyy, EEEE', new java.util.Locale('tr'))}">
                    Bugünün tarihi
                </div>
            </div>
            <div class="greeting-biz">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span th:text="${provider.businessName}">İşletme Adı</span>
            </div>
        </div>

        <!-- Bugünkü randevular -->
        <div class="date-header">
            <div class="date-label">Bugünkü Randevularım</div>
            <div class="appt-count"
                 th:text="${#lists.size(appointments)} + ' randevu'">0 randevu</div>
        </div>

        <!-- Randevu listesi -->
        <div class="appt-list" th:if="${not #lists.isEmpty(appointments)}">
            <div class="appt-card" th:each="appt : ${appointments}">

                <div class="appt-time-block">
                    <div class="appt-time" th:text="${appt.time}">09:00</div>
                    <div class="appt-time-label">saat</div>
                </div>

                <div class="appt-divider"></div>

                <div class="appt-info">
                    <div class="appt-customer">Müşteri</div>
                    <div class="appt-service" th:text="'ID: ' + ${appt.customerId}">Hizmet bilgisi</div>
                </div>

                <div class="appt-status status-approved"
                     th:classappend="${appt.status.name() == 'APPROVED'} ? 'status-approved' : 'status-pending'"
                     th:text="${appt.status.name() == 'APPROVED'} ? 'Onaylı' : 'Bekliyor'">
                    Onaylı
                </div>

            </div>
        </div>

        <!-- Boş durum -->
        <div class="empty-state" th:if="${#lists.isEmpty(appointments)}">
            <svg class="empty-icon" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <div class="empty-title">Bugün randevun yok</div>
            <div class="empty-sub">Dinlenme vakti! ☕</div>
        </div>

        <!-- Gizlilik notu -->
        <div class="privacy-note">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Sadece size atanan randevuları görüyorsunuz. İşletme verileri ve müşteri notları gizlidir.
        </div>

    </div>
</div>
</body>
</html>
