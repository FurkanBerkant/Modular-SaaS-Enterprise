spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  application:
    name: saas-platform
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI}
